name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/vearn?schema=public
  NEXTAUTH_URL: http://localhost:3000
  NEXTAUTH_SECRET: '01234567890123456789012345678901'
  JWT_SECRET: '01234567890123456789012345678901'
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  SKIP_ENV_VALIDATION: 'true'

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      # prisma generate + tsc + eslint (đồng bộ script package.json)
      - name: Quality gate (ci:check)
        run: pnpm run ci:check

      - name: Production build
        run: pnpm run build
